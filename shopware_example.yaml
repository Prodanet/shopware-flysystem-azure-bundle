shopware:
  filesystem:
    private:
      type: "azure"
      visibility: "private"
      config:
        storage_connection_string: "%env(string:AZURE_CONNECTIONSTRING)%"
        storage_account_container: "%env(AZURE_PRIVATE_CONTAINER)%"
    public: &public_azure
      url: "%env(AZURE_CDN_URL)%"
      type: "azure"
      config:
        storage_connection_string: "%env(string:AZURE_CONNECTIONSTRING)%"
        storage_account_container: "%env(AZURE_PUBLIC_CONTAINER)%"
        storage_public: true
    asset: *public_azure
    theme: *public_azure
    temp:
      type: "local"
      config:
        root: "%kernel.project_dir%/var"